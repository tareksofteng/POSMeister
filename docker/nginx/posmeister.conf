# POSmeister production nginx
# ---------------------------
# Sits in front of the php-fpm container, terminates HTTP, serves the
# Vite build artefacts straight off disk and proxies anything PHP to
# the app upstream.

server {
    listen      80;
    server_name _;
    root        /var/www/html/public;
    index       index.php;

    client_max_body_size 48m;
    server_tokens off;

    add_header X-Frame-Options              "SAMEORIGIN"  always;
    add_header X-Content-Type-Options       "nosniff"     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;

    # PWA shell — service worker MUST stay un-cached so updates ship instantly.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
    }

    # Vite hashed assets — safe to cache aggressively.
    location ^~ /build/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files                  $uri =404;
        fastcgi_pass               app:9000;
        fastcgi_index              index.php;
        fastcgi_split_path_info    ^(.+\.php)(/.+)$;
        include                    fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout       60s;
        fastcgi_buffers            16 32k;
        fastcgi_buffer_size        64k;
    }

    location ~* /\.(ht|env|git) { deny all; }
}
