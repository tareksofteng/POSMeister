; POSmeister php-fpm pool — production
[www]
user                  = www-data
group                 = www-data
listen                = 0.0.0.0:9000
listen.backlog        = 128
clear_env             = no

pm                    = dynamic
pm.max_children       = 20
pm.start_servers      = 4
pm.min_spare_servers  = 2
pm.max_spare_servers  = 6
pm.max_requests       = 500

request_slowlog_timeout = 5s
slowlog                 = /proc/self/fd/2
catch_workers_output    = yes
decorate_workers_output = no
