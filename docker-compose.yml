services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                UID: ${UID:-1000}
                GID: ${GID:-1000}
        image: posmeister-app
        environment:
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-pos_meister}
            DB_USERNAME: ${DB_USERNAME:-posmeister}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
        volumes:
            - .:/var/www/html
            - app_storage:/var/www/html/storage
        depends_on:
            db:
                condition: service_healthy
        networks: [posmeister]

    web:
        image: nginx:1.27-alpine
        ports:
            - "${APP_PORT:-8080}:80"
        volumes:
            - .:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks: [posmeister]

    db:
        image: mysql:8.0
        command:
            - --default-authentication-plugin=mysql_native_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
            MYSQL_DATABASE: ${DB_DATABASE:-pos_meister}
            MYSQL_USER: ${DB_USERNAME:-posmeister}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
        ports:
            - "${DB_PORT:-3306}:3306"
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks: [posmeister]

    node:
        image: node:20-alpine
        working_dir: /app
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        ports:
            - "${VITE_PORT:-5173}:5173"
        volumes:
            - .:/app
        networks: [posmeister]

volumes:
    db_data:
    app_storage:

networks:
    posmeister:
        driver: bridge
